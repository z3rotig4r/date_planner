[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# 1st Priority: API Proxy for Serverless Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# 2nd Priority: SPA Routing Fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
